<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuários</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .user-list { width: 100%; max-height: 220px; overflow-y: auto; text-align: left; margin-top: 15px; }
        .user-item { background: white; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #010dff; box-shadow: 0 4px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
        .user-item h3 { margin: 0 0 3px 0; color: #333; font-size: 15px; }
        .user-item p { margin: 0; color: #666; font-size: 13px; }
        .btn-delete { background: #ff0000; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; width: auto; margin-top: 0; }
        .error-message { color: #ff0000; font-size: 12px; margin-top: -5px; margin-bottom: 10px; text-align: left; display: block; }
    </style>
</head>
<body>

    <div id="tela-cadastro" class="container fade-in">
        <h1>Cadastro</h1>

        <form id="form-cadastro">
            <label>Nome</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>

            <label>E-mail</label>
            <input type="email" id="email" placeholder="Digite seu email" required>

            <label>Senha</label>
            <input type="password" id="senha" placeholder="Digite sua senha" required>
            <span id="erro-senha" class="error-message hidden">A senha precisa ter pelo menos 6 caracteres!</span>

            <button type="submit">Cadastrar</button>
        </form>

        <button type="button" id="btn-ir-lista" style="background: #333; margin-top: 10px;">Ver Cadastrados</button>
    </div>

    <div id="tela-lista" class="container hidden fade-in">
        <h1>Cadastrados</h1>

        <div class="user-list" id="caixa-usuarios">
            </div>

        <button type="button" id="btn-voltar">Voltar ao Cadastro</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
